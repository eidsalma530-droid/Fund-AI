<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your FundAI password. Get back to building your crowdfunding success.">
    <title>Forgot Password - FundAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: var(--space-lg);">
                    <div class="logo-icon"><img src="logo.png" alt="FundAI Logo"></div>
                    <span class="gradient-text">FundAI</span>
                </a>
                <h1>Reset Password</h1>
                <p class="text-secondary">Enter your email to receive a password reset link</p>
            </div>

            <form class="auth-form" id="forgot-form">
                <div id="form-alert"></div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com"
                        required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-full" id="submit-btn">
                    📧 Send Reset Link
                </button>
            </form>

            <p class="auth-footer">
                Remember your password? <a href="login.html">Log In</a>
            </p>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const alertDiv = document.getElementById('form-alert');
            const submitBtn = document.getElementById('submit-btn');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            // Simulate API call (would connect to real email service in production)
            setTimeout(() => {
                alertDiv.innerHTML = `
                    <div class="alert alert-success">
                        ✅ If an account exists for ${email}, you will receive a password reset link shortly.
                    </div>
                `;
                submitBtn.textContent = '✓ Email Sent';
            }, 1500);
        });
    </script>
</body>

</html>
