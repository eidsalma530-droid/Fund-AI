<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FundAI Admin - User Management">
    <title>Users - Admin Panel - FundAI</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <!-- Admin Header -->
    <header class="admin-header">
        <a href="../index.html" class="logo">
            <div class="logo-icon"><img src="../logo.png" alt="FundAI Logo"></div>
            <span class="gradient-text">FundAI</span>
            <span class="admin-badge warning">ADMIN</span>
        </a>
        <nav class="admin-nav">
            <a href="index.html" class="admin-nav-link">Dashboard</a>
            <a href="users.html" class="admin-nav-link active">Users</a>
            <a href="campaigns.html" class="admin-nav-link">Campaigns</a>
        </nav>
        <div>
            <a href="../index.html" class="btn btn-secondary">← Back to Site</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="section" style="padding-top: 40px;">
        <div class="container">
            <div class="flex justify-between items-center mb-lg">
                <h1>User <span class="gradient-text">Management</span></h1>
                <div class="flex gap-md">
                    <input type="text" class="form-input" id="search-input" placeholder="Search users..."
                        style="width: 250px;">
                </div>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Rating</th>
                                <th>Joined</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <tr>
                                <td colspan="7" class="text-center">
                                    <div class="loading">
                                        <div class="spinner"></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="../js/app.js"></script>
    <script>
        let allUsers = [];

        document.addEventListener('DOMContentLoaded', loadUsers);

        async function loadUsers() {
            try {
                const data = await api.getAllUsers();
                allUsers = data.users;
                renderUsers(allUsers);
            } catch (error) {
                document.getElementById('users-tbody').innerHTML = `
                    <tr><td colspan="7" class="text-center text-muted">Unable to load users</td></tr>
                `;
            }
        }

        function renderUsers(users) {
            if (users.length === 0) {
                document.getElementById('users-tbody').innerHTML = `
                    <tr><td colspan="7" class="text-center text-muted">No users found</td></tr>
                `;
                return;
            }

            document.getElementById('users-tbody').innerHTML = users.map(u => `
                <tr>
                    <td>#${u.id}</td>
                    <td>
                        <strong>${escapeHtml(u.name)}</strong>
                        ${u.is_verified ? '<span class="verified-badge">✓ Verified</span>' : ''}
                    </td>
                    <td>${escapeHtml(u.email)}</td>
                    <td>
                        <span class="admin-badge ${u.role === 'creator' ? 'success' : 'warning'}">
                            ${u.role}
                        </span>
                        ${u.is_admin ? '<span class="admin-badge danger">Admin</span>' : ''}
                    </td>
                    <td>
                        ${u.avg_rating > 0 ? `⭐ ${u.avg_rating.toFixed(1)} (${u.total_reviews})` : '-'}
                    </td>
                    <td>${formatDate(u.created_at)}</td>
                    <td><span class="admin-badge success">Active</span></td>
                </tr>
            `).join('');
        }

        // Search functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u =>
                u.name.toLowerCase().includes(query) ||
                u.email.toLowerCase().includes(query)
            );
            renderUsers(filtered);
        });
    </script>
</body>

</html>
