<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Browse AI-evaluated crowdfunding campaigns on FundAI. Find promising projects with success predictions.">
    <title>Browse Campaigns - FundAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><img src="logo.png" alt="FundAI Logo"></div>
                <span class="gradient-text">FundAI</span>
            </a>

            <div class="nav-links">
                <a href="campaigns.html" class="nav-link active">Campaigns</a>
                <a href="index.html#how-it-works" class="nav-link">How it Works</a>
            </div>

            <div class="nav-auth" id="nav-auth">
                <a href="login.html" class="btn btn-secondary">Log In</a>
                <a href="signup.html" class="btn btn-primary">Get Started</a>
            </div>

            <div class="nav-auth hidden" id="nav-user">
                <a href="profile.html" class="btn btn-secondary" id="nav-profile-btn">Profile</a>
                <button class="btn btn-secondary" id="nav-logout-btn" onclick="auth.logout()">Log Out</button>
            </div>
        </div>
    </nav>

    <main style="padding-top: 120px; min-height: 100vh;">
        <div class="container">
            <div class="flex justify-between items-center mb-lg" style="flex-wrap: wrap; gap: var(--space-md);">
                <div>
                    <h1>Browse <span class="gradient-text">Campaigns</span></h1>
                    <p class="text-secondary">Discover AI-evaluated crowdfunding projects</p>
                </div>

                <div class="filters">
                    <select id="filter-category" class="filter-dropdown">
                        <option value="">All Categories</option>
                        <option value="Technology">Technology</option>
                        <option value="Design">Design</option>
                        <option value="Games">Games</option>
                        <option value="Film & Video">Film & Video</option>
                        <option value="Music">Music</option>
                        <option value="Food">Food</option>
                        <option value="Publishing">Publishing</option>
                        <option value="Art">Art</option>
                        <option value="Fashion">Fashion</option>
                    </select>

                    <select id="filter-score" class="filter-dropdown">
                        <option value="">All Scores</option>
                        <option value="0.7">70%+ AI Score</option>
                        <option value="0.5">50%+ AI Score</option>
                        <option value="0.3">30%+ AI Score</option>
                    </select>

                    <select id="filter-sort" class="filter-dropdown">
                        <option value="newest">Newest First</option>
                        <option value="score">Highest Score</option>
                        <option value="goal">Highest Goal</option>
                    </select>
                </div>
            </div>

            <!-- Campaigns Grid -->
            <div class="grid grid-3" id="campaigns-grid">
                <div class="loading" style="grid-column: 1 / -1;">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- Load More -->
            <div class="text-center mt-lg hidden" id="load-more-container">
                <button class="btn btn-secondary" id="load-more-btn">Load More</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-text">
                    © 2024 FundAI. AI-Powered Crowdfunding Platform.
                </div>
            </div>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/app.js"></script>
    <script>
        let allCampaigns = [];
        let filteredCampaigns = [];

        document.addEventListener('DOMContentLoaded', async () => {
            updateNavbar();
            await loadCampaigns();
            setupFilters();
        });

        async function loadCampaigns() {
            const container = document.getElementById('campaigns-grid');

            try {
                allCampaigns = await api.getCampaigns();
                filteredCampaigns = [...allCampaigns];
                renderCampaigns();

            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">⚠️</div>
                        <h3 class="empty-title">Unable to Load Campaigns</h3>
                        <p class="empty-description">Server may be starting up. Please try again.</p>
                        <button class="btn btn-primary" onclick="location.reload()">Refresh</button>
                    </div>
                `;
            }
        }

        function renderCampaigns() {
            const container = document.getElementById('campaigns-grid');

            if (filteredCampaigns.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">📭</div>
                        <h3 class="empty-title">No Campaigns Found</h3>
                        <p class="empty-description">Try adjusting your filters or check back later.</p>
                        ${auth.isLoggedIn() && auth.getUser().role === 'creator' ? `
                            <a href="create-campaign.html" class="btn btn-primary">Create Campaign</a>
                        ` : ''}
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredCampaigns.map(campaign => `
                <a href="campaign-detail.html?id=${campaign.id}" class="card campaign-card">
                    <div class="campaign-image" style="background: linear-gradient(135deg, ${getGradientColor(campaign.main_category)}); display: flex; align-items: center; justify-content: center;">
                        <span style="font-size: 4rem;">${getCategoryEmoji(campaign.main_category)}</span>
                    </div>
                    <div class="campaign-content">
                        <div class="flex justify-between items-center mb-sm">
                            <span class="campaign-category">${campaign.main_category}</span>
                            <span class="text-muted" style="font-size: 0.8rem;">📍 ${campaign.country}</span>
                        </div>
                        <h3 class="campaign-title">${escapeHtml(campaign.name)}</h3>
                        <p class="campaign-blurb">${escapeHtml(campaign.blurb)}</p>
                        <div class="campaign-meta">
                            <div>
                                <div class="campaign-goal">$${formatNumber(campaign.usd_goal)}</div>
                                <div class="text-muted" style="font-size: 0.8rem;">${campaign.duration_days} days</div>
                            </div>
                            ${campaign.ai_score !== null ? `
                                <div class="text-center">
                                    <div class="campaign-score ${getScoreClass(campaign.ai_score)}" style="font-size: 1.25rem;">
                                        🎯 ${(campaign.ai_score * 100).toFixed(0)}%
                                    </div>
                                    <div class="text-muted" style="font-size: 0.75rem;">AI Score</div>
                                </div>
                            ` : `
                                <div class="campaign-score text-muted">⏳ Pending</div>
                            `}
                        </div>
                    </div>
                </a>
            `).join('');
        }

        function setupFilters() {
            const categoryFilter = document.getElementById('filter-category');
            const scoreFilter = document.getElementById('filter-score');
            const sortFilter = document.getElementById('filter-sort');

            [categoryFilter, scoreFilter, sortFilter].forEach(filter => {
                filter.addEventListener('change', applyFilters);
            });
        }

        function applyFilters() {
            const category = document.getElementById('filter-category').value;
            const minScore = parseFloat(document.getElementById('filter-score').value) || 0;
            const sort = document.getElementById('filter-sort').value;

            filteredCampaigns = allCampaigns.filter(campaign => {
                if (category && campaign.main_category !== category) return false;
                if (minScore && (campaign.ai_score === null || campaign.ai_score < minScore)) return false;
                return true;
            });

            // Sort
            switch (sort) {
                case 'score':
                    filteredCampaigns.sort((a, b) => (b.ai_score || 0) - (a.ai_score || 0));
                    break;
                case 'goal':
                    filteredCampaigns.sort((a, b) => b.usd_goal - a.usd_goal);
                    break;
                case 'newest':
                default:
                    filteredCampaigns.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            }

            renderCampaigns();
        }

        function getGradientColor(category) {
            const gradients = {
                'Technology': '#667eea, #764ba2',
                'Design': '#f093fb, #f5576c',
                'Games': '#4facfe, #00f2fe',
                'Film & Video': '#fa709a, #fee140',
                'Music': '#a8edea, #fed6e3',
                'Food': '#ff9a9e, #fad0c4',
                'Publishing': '#ffecd2, #fcb69f',
                'Art': '#667eea, #764ba2',
                'Fashion': '#a18cd1, #fbc2eb'
            };
            return gradients[category] || '#667eea, #764ba2';
        }
    </script>
</body>

</html>
