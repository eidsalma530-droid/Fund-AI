<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Messages - FundAI">
    <title>Messages - FundAI</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .message-tabs {
            display: flex;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        .message-tab {
            padding: var(--space-md) var(--space-lg);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--text-muted);
        }

        .message-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--primary-color);
        }

        .message-item {
            padding: var(--space-lg);
            border-bottom: 1px solid var(--border-color);
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .message-item:hover {
            background: var(--bg-glass);
        }

        .message-item.unread {
            background: rgba(102, 126, 234, 0.1);
            border-left: 3px solid var(--primary-color);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-sm);
        }

        .message-sender {
            font-weight: 600;
        }

        .message-time {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .message-subject {
            font-weight: 500;
            margin-bottom: var(--space-xs);
        }

        .message-preview {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .compose-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: var(--space-lg);
        }

        .compose-modal.hidden {
            display: none;
        }

        .compose-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            max-width: 600px;
            width: 100%;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><img src="logo.png" alt="FundAI Logo"></div>
                <span class="gradient-text">FundAI</span>
            </a>
            <div class="nav-links">
                <a href="campaigns.html" class="nav-link">Campaigns</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
            </div>
            <div class="nav-auth" id="nav-auth"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="section" style="padding-top: 120px;">
        <div class="container" style="max-width: 800px;">
            <div class="flex justify-between items-center mb-lg">
                <h1 class="animate-fade-in-up">📬 <span class="gradient-text">Messages</span></h1>
                <button class="btn btn-primary" onclick="showComposeModal()">✉️ Compose</button>
            </div>

            <!-- Tabs -->
            <div class="message-tabs">
                <div class="message-tab active" data-tab="inbox" onclick="switchTab('inbox')">
                    📥 Inbox <span class="admin-badge warning" id="unread-badge" style="display: none;">0</span>
                </div>
                <div class="message-tab" data-tab="sent" onclick="switchTab('sent')">📤 Sent</div>
            </div>

            <!-- Messages List -->
            <div class="card">
                <div id="messages-list">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Compose Modal -->
    <div class="compose-modal hidden" id="compose-modal">
        <div class="compose-content">
            <div class="flex justify-between items-center mb-lg">
                <h3>✉️ New Message</h3>
                <button class="btn btn-sm btn-secondary" onclick="hideComposeModal()">✕</button>
            </div>
            <form id="compose-form">
                <div class="form-group">
                    <label class="form-label">To (User Email) *</label>
                    <input type="email" class="form-input" id="recipient-email" placeholder="recipient@email.com"
                        required>
                </div>
                <div class="form-group">
                    <label class="form-label">Subject *</label>
                    <input type="text" class="form-input" id="message-subject" placeholder="Message subject" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Message *</label>
                    <textarea class="form-input form-textarea" id="message-content" rows="5"
                        placeholder="Write your message..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">📤 Send Message</button>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/app.js"></script>
    <script>
        // Require login
        if (!auth.isLoggedIn()) {
            window.location.href = 'login.html';
        }

        const user = auth.getUser();
        let currentTab = 'inbox';
        let messagesData = { inbox: [], sent: [] };

        document.addEventListener('DOMContentLoaded', loadMessages);

        async function loadMessages() {
            try {
                const data = await api.getUserMessages(user.id);
                messagesData = data;

                // Show unread badge
                if (data.unread_count > 0) {
                    document.getElementById('unread-badge').textContent = data.unread_count;
                    document.getElementById('unread-badge').style.display = 'inline-flex';
                }

                renderMessages();
            } catch (error) {
                document.getElementById('messages-list').innerHTML = `
                    <div class="empty-state">
                        <p class="text-muted">Unable to load messages</p>
                    </div>
                `;
            }
        }

        function renderMessages() {
            const messages = currentTab === 'inbox' ? messagesData.inbox : messagesData.sent;

            if (messages.length === 0) {
                document.getElementById('messages-list').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <h3>No messages</h3>
                        <p class="text-muted">${currentTab === 'inbox' ? 'Your inbox is empty' : 'No sent messages'}</p>
                    </div>
                `;
                return;
            }

            document.getElementById('messages-list').innerHTML = messages.map(msg => `
                <div class="message-item ${!msg.is_read && currentTab === 'inbox' ? 'unread' : ''}" onclick="viewMessage(${msg.id})">
                    <div class="message-header">
                        <span class="message-sender">${currentTab === 'inbox' ? escapeHtml(msg.sender_name) : 'To: ' + escapeHtml(msg.recipient_name)}</span>
                        <span class="message-time">${formatDate(msg.created_at)}</span>
                    </div>
                    <div class="message-subject">${escapeHtml(msg.subject)}</div>
                    <div class="message-preview">${escapeHtml(msg.content.substring(0, 100))}${msg.content.length > 100 ? '...' : ''}</div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.message-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            renderMessages();
        }

        async function viewMessage(messageId) {
            // Mark as read
            try {
                await api.markMessageRead(messageId);
                await loadMessages();
            } catch (e) { }

            // Find the message
            const message = [...messagesData.inbox, ...messagesData.sent].find(m => m.id === messageId);
            if (message) {
                alert(`From: ${message.sender_name}\nSubject: ${message.subject}\n\n${message.content}`);
            }
        }

        function showComposeModal() {
            document.getElementById('compose-modal').classList.remove('hidden');
        }

        function hideComposeModal() {
            document.getElementById('compose-modal').classList.add('hidden');
            document.getElementById('compose-form').reset();
        }

        document.getElementById('compose-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const recipientEmail = document.getElementById('recipient-email').value;

            // For demo, we'll need to find user by email - in real app this would be an API call
            // For now, just show success
            try {
                // Mock recipient ID (in real app, lookup by email)
                const recipientId = 1; // This would be looked up

                await api.sendMessage({
                    sender_id: user.id,
                    recipient_id: recipientId,
                    subject: document.getElementById('message-subject').value,
                    content: document.getElementById('message-content').value
                });

                showToast('Message sent!', 'success');
                hideComposeModal();
                loadMessages();
            } catch (error) {
                showToast(error.message, 'error');
            }
        });

        // Close modal on outside click
        document.getElementById('compose-modal').addEventListener('click', (e) => {
            if (e.target.id === 'compose-modal') hideComposeModal();
        });
    </script>
</body>

</html>
