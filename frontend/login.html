<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your FundAI account to manage campaigns and view AI-powered insights.">
    <title>Log In - FundAI</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: var(--space-lg);">
                    <div class="logo-icon"><img src="logo.png" alt="FundAI Logo"></div>
                    <span class="gradient-text">FundAI</span>
                </a>
                <h1>Welcome Back</h1>
                <p class="text-secondary">Log in to continue your crowdfunding journey</p>
            </div>

            <form class="auth-form" id="login-form">
                <div id="form-alert"></div>

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com"
                        required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Enter your password" required>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex justify-between items-center mb-lg">
                    <label class="form-checkbox-group">
                        <input type="checkbox" id="remember" class="form-checkbox">
                        <span class="text-secondary" style="font-size: 0.9rem;">Remember me</span>
                    </label>
                    <a href="forgot-password.html" style="font-size: 0.9rem;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-full" id="submit-btn">
                    Log In 🚀
                </button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </p>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (auth.isLoggedIn()) {
            window.location.href = 'profile.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = e.target;
            const submitBtn = document.getElementById('submit-btn');
            const alertDiv = document.getElementById('form-alert');

            const email = form.email.value.trim();
            const password = form.password.value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            alertDiv.innerHTML = '';

            try {
                const result = await api.login({ email, password });

                auth.login(result.user);

                showToast('Welcome back! 👋', 'success');

                // Redirect to appropriate page
                setTimeout(() => {
                    const user = result.user;
                    if (user.role === 'creator') {
                        window.location.href = 'profile.html';
                    } else {
                        window.location.href = 'campaigns.html';
                    }
                }, 1000);

            } catch (error) {
                alertDiv.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In 🚀';
            }
        });
    </script>
</body>

</html>
