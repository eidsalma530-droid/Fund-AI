<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Create your FundAI account. Join as a creator or investor to access AI-powered crowdfunding insights.">
    <title>Sign Up - FundAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: var(--space-lg);">
                    <div class="logo-icon"><img src="logo.png" alt="FundAI Logo"></div>
                    <span class="gradient-text">FundAI</span>
                </a>
                <h1>Create Your Account</h1>
                <p class="text-secondary">Join the AI-powered crowdfunding revolution</p>
            </div>

            <form class="auth-form" id="signup-form">
                <div id="form-alert"></div>

                <!-- Role Selection -->
                <div class="form-group">
                    <label class="form-label">I want to join as a:</label>
                    <div class="role-selector">
                        <label class="role-option">
                            <input type="radio" name="role" value="creator" required>
                            <div class="role-card">
                                <div class="role-icon">🎨</div>
                                <div class="role-title">Creator</div>
                                <div class="role-description">Launch campaigns and get AI-powered insights</div>
                            </div>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="investor">
                            <div class="role-card">
                                <div class="role-icon">💼</div>
                                <div class="role-title">Investor</div>
                                <div class="role-description">Discover promising projects with AI analysis</div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Name -->
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-input" placeholder="Enter your full name"
                        required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com"
                        required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Create a strong password" required minlength="6">
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" class="form-input"
                        placeholder="Confirm your password" required minlength="6">
                </div>

                <!-- About (Optional) -->
                <div class="form-group">
                    <label class="form-label" for="about">About You (Optional)</label>
                    <textarea id="about" name="about" class="form-input form-textarea"
                        placeholder="Tell us a bit about yourself..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-full" id="submit-btn">
                    Create Account 🚀
                </button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="login.html">Log In</a>
            </p>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (auth.isLoggedIn()) {
            window.location.href = 'profile.html';
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = e.target;
            const submitBtn = document.getElementById('submit-btn');
            const alertDiv = document.getElementById('form-alert');

            // Get form values
            const role = form.querySelector('input[name="role"]:checked')?.value;
            const name = form.name.value.trim();
            const email = form.email.value.trim();
            const password = form.password.value;
            const confirmPassword = form['confirm-password'].value;
            const about = form.about.value.trim();

            // Validation
            if (!role) {
                alertDiv.innerHTML = '<div class="alert alert-error">Please select a role (Creator or Investor)</div>';
                return;
            }

            if (password !== confirmPassword) {
                alertDiv.innerHTML = '<div class="alert alert-error">Passwords do not match</div>';
                return;
            }

            if (password.length < 6) {
                alertDiv.innerHTML = '<div class="alert alert-error">Password must be at least 6 characters</div>';
                return;
            }

            // Submit
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            alertDiv.innerHTML = '';

            try {
                const result = await api.signup({
                    email,
                    password,
                    name,
                    role,
                    about
                });

                // Auto login after signup
                auth.login(result.user);

                showToast('Account created successfully! 🎉', 'success');

                // Redirect based on role
                setTimeout(() => {
                    if (role === 'creator') {
                        window.location.href = 'create-campaign.html';
                    } else {
                        window.location.href = 'campaigns.html';
                    }
                }, 1000);

            } catch (error) {
                alertDiv.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account 🚀';
            }
        });
    </script>
</body>

</html>
