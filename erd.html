<!DOCTYPE html>

<head>
<meta charset="UTF-8"/>
<title>FundAI — Database ERD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5}
h1{font-size:15px;font-weight:600;padding:10px 14px;background:#fff;border-bottom:1px solid #e0e0e0;color:#1a1a1a}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border-bottom:1px solid #e0e0e0;flex-wrap:wrap}
.tb-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
.tb-btn{font-size:12px;padding:4px 10px;border:1px solid #d0d0d0;border-radius:6px;background:#fff;color:#333;cursor:pointer}
.tb-btn:hover{background:#f0f0f0}
.tb-btn.active{background:#1a56db;color:#fff;border-color:#1a56db}
.legend{display:flex;gap:14px;font-size:11px;color:#555;padding:6px 12px;background:#fff;border-bottom:1px solid #e0e0e0;flex-wrap:wrap;align-items:center}
.leg{display:flex;align-items:center;gap:5px}
.leg-sq{width:12px;height:12px;border-radius:2px;flex-shrink:0}
#canvas-wrap{overflow:auto;background:#eef0f3;padding:0}
svg#erd{display:block;cursor:grab}
svg#erd:active{cursor:grabbing}
</style>
</head>
<body>
<h1>FundAI — Interactive Entity Relationship Diagram</h1>
<div class="toolbar">
  <span class="tb-label">Filter</span>
  <button class="tb-btn active" onclick="filterGroup('all',this)">All tables (19)</button>
  <button class="tb-btn" onclick="filterGroup('core',this)">Core</button>
  <button class="tb-btn" onclick="filterGroup('content',this)">Content</button>
  <button class="tb-btn" onclick="filterGroup('finance',this)">Finance</button>
  <button class="tb-btn" onclick="filterGroup('social',this)">Social</button>
  <button class="tb-btn" onclick="filterGroup('system',this)">System</button>
  <span style="margin-left:auto;font-size:11px;color:#999">Drag tables · Scroll to pan</span>
</div>
<div class="legend">
  <span class="leg"><span class="leg-sq" style="background:#E6F1FB;border:1.5px solid #185FA5"></span>Strong entity</span>
  <span class="leg"><span class="leg-sq" style="background:#FAEEDA;border:2px dashed #BA7517"></span>Weak entity</span>
  <span class="leg"><span class="leg-sq" style="background:#EAF3DE;border:1.5px solid #3B6D11"></span>Associative</span>
  <span class="leg"><span style="width:24px;height:2px;background:#888;display:inline-block;vertical-align:middle"></span>&nbsp;1:N</span>
  <span class="leg"><span style="width:24px;height:2px;border-top:2px dashed #aaa;display:inline-block;vertical-align:middle"></span>&nbsp;optional FK</span>
</div>
<div id="canvas-wrap">

const COL_H=22, HEADER_H=30;
const TC={
  strong:{fill:'#E6F1FB',stroke:'#185FA5',hdr:'#185FA5',hdrText:'#fff',text:'#042C53',typeText:'#378ADD'},
  weak:  {fill:'#FAEEDA',stroke:'#BA7517',hdr:'#BA7517',hdrText:'#fff',text:'#412402',typeText:'#BA7517'},
  assoc: {fill:'#EAF3DE',stroke:'#3B6D11',hdr:'#3B6D11',hdrText:'#fff',text:'#173404',typeText:'#3B6D11'},
};

function tW(t){return Math.max(180,t.label.length*9+70)}
function tH(t){return HEADER_H+t.cols.length*COL_H+6}

function anchor(t,side){
  const w=tW(t),h=tH(t);
  if(side==='right') return {x:t.x+w,y:t.y+h/2};
  if(side==='left')  return {x:t.x,  y:t.y+h/2};
  if(side==='bottom')return {x:t.x+w/2,y:t.y+h};
  return                    {x:t.x+w/2,y:t.y};
}

function bestSides(a,b){
  const acx=a.x+tW(a)/2, bcx=b.x+tW(b)/2;
  const acy=a.y+tH(a)/2, bcy=b.y+tH(b)/2;
  if(Math.abs(acx-bcx)>Math.abs(acy-bcy)){
    return acx<bcx?['right','left']:['left','right'];
  }
  return acy<bcy?['bottom','top']:['top','bottom'];
}

function pathD(p1,p2){
  const dx=p2.x-p1.x,dy=p2.y-p1.y;
  if(Math.abs(dx)>Math.abs(dy)){
    const mx=(p1.x+p2.x)/2;
    return `M${p1.x},${p1.y} C${mx},${p1.y} ${mx},${p2.y} ${p2.x},${p2.y}`;
  }
  const my=(p1.y+p2.y)/2;
  return `M${p1.x},${p1.y} C${p1.x},${my} ${p2.x},${my} ${p2.x},${p2.y}`;
}

let activeGroup='all';
let vis=new Set(TABLES.map(t=>t.id));

function filterGroup(g,btn){
  activeGroup=g;
  document.querySelectorAll('.tb-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  vis=new Set(g==='all'?TABLES.map(t=>t.id):TABLES.filter(t=>t.group===g).map(t=>t.id));
  render();
}

function render(){
  const svg=document.getElementById('erd');
  const tl=document.getElementById('tables-layer');
  const rl=document.getElementById('relations-layer');
  tl.innerHTML=''; rl.innerHTML='';
  const tMap=Object.fromEntries(TABLES.map(t=>[t.id,t]));

  RELATIONS.forEach(rel=>{
    if(!vis.has(rel.from)||!vis.has(rel.to)) return;
    const a=tMap[rel.from], b=tMap[rel.to];
    if(rel.from===rel.to){
      const w=tW(a),h=tH(a);
      const x1=a.x+w*0.65,y1=a.y+h,x2=a.x+w,y2=a.y+h*0.65;
      rl.innerHTML+=`<path d="M${x1},${y1} C${x1},${y1+45} ${x2+45},${y2+45} ${x2},${y2}" fill="none" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#crow-many)"/>
      <text x="${x1+22}" y="${y1+40}" font-size="10" fill="#aaa" text-anchor="middle">${rel.label}</text>`;
      return;
    }
    const [s1,s2]=bestSides(a,b);
    const p1=anchor(a,s1), p2=anchor(b,s2);
    const d=pathD(p1,p2);
    const dashed=rel.card==='11'?'stroke-dasharray="5 3"':'';
    const mend=rel.card==='1N'?'marker-end="url(#crow-many)"':'marker-end="url(#crow-one)"';
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    rl.innerHTML+=`<path d="${d}" fill="none" stroke="#aaa" stroke-width="1.2" marker-start="url(#crow-one-r)" ${mend} ${dashed}/>
    <text x="${mx}" y="${my-4}" font-size="10" fill="#999" text-anchor="middle" style="pointer-events:none">${rel.label}</text>`;
  });

  TABLES.forEach(t=>{
    if(!vis.has(t.id)) return;
    const w=tW(t), h=tH(t), c=TC[t.type];
    const dash=t.type==='weak'?'stroke-dasharray="6 3"':'';
    let g=`<g class="tbl" data-id="${t.id}" transform="translate(${t.x},${t.y})">`;
    g+=`<rect width="${w}" height="${h}" rx="8" fill="${c.fill}" stroke="${c.stroke}" stroke-width="${t.type==='weak'?2:1.5}" ${dash}/>`;
    g+=`<rect width="${w}" height="${HEADER_H}" rx="0" fill="${c.hdr}" clip-path="url(#hc-${t.id})"/>`;
    g+=`<defs><clipPath id="hc-${t.id}"><rect width="${w}" height="${HEADER_H}"/><rect x="-1" y="${HEADER_H-8}" width="${w+2}" height="8"/></clipPath></defs>`;
    g+=`<text x="${w/2}" y="${HEADER_H/2+1}" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="${c.hdrText}">${t.label}</text>`;
    t.cols.forEach((col,i)=>{
      const cy=HEADER_H+i*COL_H+COL_H/2+3;
      const rowBg=i%2===0?'rgba(255,255,255,0.5)':'transparent';
      g+=`<rect x="1" y="${HEADER_H+i*COL_H+1}" width="${w-2}" height="${COL_H}" fill="${rowBg}"/>`;
      if(col.pk)      g+=`<text x="9"  y="${cy+1}" dominant-baseline="central" font-size="10" fill="#BA7517" font-weight="600">PK</text>`;
      else if(col.fk) g+=`<text x="9"  y="${cy+1}" dominant-baseline="central" font-size="10" fill="#3B6D11">FK</text>`;
      else if(col.uk) g+=`<text x="9"  y="${cy+1}" dominant-baseline="central" font-size="10" fill="#534AB7">UK</text>`;
      g+=`<text x="38" y="${cy+1}" dominant-baseline="central" font-size="12" fill="${c.text}" font-weight="${col.pk?'600':'400'}">${col.name}</text>`;
      g+=`<text x="${w-8}" y="${cy+1}" dominant-baseline="central" font-size="10" fill="${c.typeText}" text-anchor="end">${col.type}</text>`;
    });
    g+=`</g>`;
    tl.innerHTML+=g;
  });

  makeDraggable();
}

function makeDraggable(){
  let drag=null,ox=0,oy=0;
  const svg=document.getElementById('erd');
  document.querySelectorAll('.tbl').forEach(g=>{
    g.style.cursor='move';
    g.addEventListener('mousedown',e=>{
      const t=TABLES.find(x=>x.id===g.dataset.id);
      const pt=svg.createSVGPoint();
      pt.x=e.clientX; pt.y=e.clientY;
      const sp=pt.matrixTransform(svg.getScreenCTM().inverse());
      ox=sp.x-t.x; oy=sp.y-t.y;
      drag=t; e.stopPropagation(); e.preventDefault();
    });
  });
  svg.addEventListener('mousemove',e=>{
    if(!drag) return;
    const pt=svg.createSVGPoint();
    pt.x=e.clientX; pt.y=e.clientY;
    const sp=pt.matrixTransform(svg.getScreenCTM().inverse());
    drag.x=Math.max(0,sp.x-ox);
    drag.y=Math.max(0,sp.y-oy);
    render();
  });
  svg.addEventListener('mouseup',()=>{drag=null;});
  svg.addEventListener('mouseleave',()=>{drag=null;});
}

render();
</script>
</body>
</html>
